<!DOCTYPE html>
<html>

<head>
    <title>My Cart</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 36px;
        }

        #cartItems {
            width: 100%;
            max-width: 950px;
            margin: auto;
        }

        .cart-item {

            background: #fff;

            border-radius: 12px;

            padding: 20px;

            margin-bottom: 20px;

            display: flex;

            justify-content: space-between;

            align-items: center;

            gap: 20px;

            flex-wrap: wrap;

            box-shadow: 0 4px 12px rgba(0, 0, 0, .1);

            transition: .3s;
        }

        .cart-item:hover {

            transform: translateY(-4px);
        }

        .product-info {

            flex: 1;

            min-width: 250px;
        }

        .product-info h3 {

            font-size: 22px;

            margin-bottom: 10px;

            word-break: break-word;
        }

        .product-info p {

            font-size: 19px;

            color: #666;

            font-weight: bold;
        }

        .delete-btn {

            background: #ef4444;

            color: #fff;

            border: none;

            padding: 12px 20px;

            border-radius: 8px;

            cursor: pointer;

            font-size: 15px;

            font-weight: bold;

            min-width: 150px;

            transition: .3s;
        }

        .delete-btn:hover {

            background: #dc2626;
        }

        .total-box {

            width: 100%;

            max-width: 950px;

            margin: 25px auto;

            background: #fff;

            padding: 20px;

            border-radius: 12px;

            text-align: right;

            font-size: 24px;

            font-weight: bold;

            box-shadow: 0 4px 12px rgba(0, 0, 0, .1);
        }

        .continue-btn {

            display: block;

            width: 260px;

            margin: 20px auto;

            background: #111827;

            color: #fff;

            text-align: center;

            text-decoration: none;

            padding: 15px;

            border-radius: 10px;

            font-size: 17px;

            font-weight: bold;

            transition: .3s;
        }

        .continue-btn:hover {

            background: #374151;
        }

        .buy-btn {

            display: block;

            width: 260px;

            margin: 30px auto;

            background: #16a34a;

            color: #fff;

            text-align: center;

            text-decoration: none;

            padding: 15px;

            border-radius: 10px;

            font-size: 18px;

            font-weight: bold;

            transition: .3s;
        }

        .buy-btn:hover {

            background: #15803d;
        }

        /* ===========================
   Tablet
=========================== */

        @media(max-width:768px) {

            body {
                padding: 20px;
            }

            h1 {
                font-size: 30px;
            }

            .cart-item {

                flex-direction: column;

                align-items: stretch;

                gap: 18px;
            }

            .product-info {

                width: 100%;

                text-align: left;
            }

            .delete-btn {

                width: 100%;
            }

            .total-box {

                text-align: center;

                font-size: 22px;
            }

            .buy-btn,
            .continue-btn {

                width: 100%;

                max-width: 350px;
            }

        }

        /* ===========================
   Mobile
=========================== */

        @media(max-width:480px) {

            body {

                padding: 15px;
            }

            h1 {

                font-size: 24px;

                margin-bottom: 20px;
            }

            .cart-item {

                padding: 18px;

                gap: 18px;

                flex-direction: column;

                align-items: center;

                text-align: center;
            }

            .product-info {

                width: 100%;

                text-align: center;
            }

            .product-info h3 {

                font-size: 20px;
            }

            .product-info p {

                font-size: 18px;
            }

            .delete-btn {

                width: 100%;

                padding: 14px;

                font-size: 16px;
            }

            .total-box {

                padding: 18px;

                font-size: 20px;

                text-align: center;
            }

            .buy-btn,
            .continue-btn {

                width: 100%;

                font-size: 17px;
            }

        }
    </style>
</head>

<body>

    <h1>My Cart</h1>

    <hr>

    <div id="cartItems"></div>

    <br>

    <!-- <a href="index.html">
        Continue Shopping
    </a> -->

    <a href="checkout.html" class="buy-btn">
        Buy Now
    </a>

    <script src="assets/js/cart.js"></script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <title>My Wishlist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111827;
            color: #fff;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #f43f5e;
            margin-bottom: 30px;
            font-size: 36px;
        }

        #wishlistItems {
            width: 100%;
            max-width: 950px;
            margin: auto;
        }

        .wishlist-item {

            background: #1f2937;

            border-radius: 12px;

            padding: 20px;

            margin-bottom: 20px;

            display: flex;

            justify-content: space-between;

            align-items: center;

            gap: 25px;

            flex-wrap: wrap;

            box-shadow: 0 4px 12px rgba(0, 0, 0, .35);

            transition: .3s;
        }

        .wishlist-item:hover {

            transform: translateY(-4px);
        }

        .product-info {

            flex: 1;
            min-width: 220px;
        }

        .product-info h3 {

            color: #fff;

            font-size: 22px;

            margin-bottom: 10px;
        }

        .product-info p {

            color: #fbbf24;

            font-size: 20px;

            font-weight: bold;
        }

        .button-group {

            display: flex;

            gap: 12px;

            flex-wrap: wrap;
        }

        .cart-btn {

            background: #10b981;

            color: #fff;

            border: none;

            padding: 12px 20px;

            border-radius: 8px;

            cursor: pointer;

            font-size: 15px;

            font-weight: bold;

            transition: .3s;
        }

        .cart-btn:hover {

            background: #059669;
        }

        .delete-btn {

            background: #ef4444;

            color: #fff;

            border: none;

            padding: 12px 20px;

            border-radius: 8px;

            cursor: pointer;

            font-size: 15px;

            font-weight: bold;

            transition: .3s;
        }

        .delete-btn:hover {

            background: #dc2626;
        }

        .continue-btn {

            display: block;

            width: 280px;

            margin: 35px auto 0;

            text-align: center;

            background: #f43f5e;

            color: #fff;

            padding: 15px;

            text-decoration: none;

            border-radius: 10px;

            font-size: 17px;

            font-weight: bold;

            transition: .3s;
        }

        .continue-btn:hover {

            background: #e11d48;
        }

        /* ===========================
   Responsive Wishlist Fix
   =========================== */

        /* Button container (works without changing JS) */
        .wishlist-item>div:last-child {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-items: center;
        }

        /* Tablet */
        @media (max-width:768px) {

            body {
                padding: 20px;
            }

            .wishlist-item {
                flex-direction: column;
                align-items: stretch;
                gap: 18px;
            }

            .product-info {
                width: 100%;
                text-align: left;
            }

            .wishlist-item>div:last-child {
                width: 100%;
                display: flex;
                gap: 12px;
            }

            .wishlist-item>div:last-child button {
                flex: 1;
            }

        }

        /* Mobile */
        @media (max-width:480px) {

            body {
                padding: 15px;
            }

            h1 {
                font-size: 24px;
            }

            .wishlist-item {
                padding: 18px;
                gap: 18px;
            }

            .product-info {
                width: 100%;
                text-align: center;
            }

            .product-info h3 {
                font-size: 20px;
            }

            .product-info p {
                font-size: 18px;
            }

            .wishlist-item>div:last-child {

                width: 100%;

                display: flex;

                flex-direction: column;

                gap: 12px;
            }

            .wishlist-item>div:last-child button {

                width: 100%;
            }

            .continue-btn {
                width: 100%;
            }

        }
    </style>

</head>

<body>

    <h1>My Wishlist</h1>

    <div id="wishlistItems"></div>

    <a href="index.html" class="continue-btn">
        Continue Shopping
    </a>

    <script src="js/script.js"></script>
    <script src="./assets/js/wishlist.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Order Placed</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .success-card {
            background: #fff;
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,.15);
        }

        .tick {
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
        }

        .tick img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h1 {
            color: #16a34a;
            margin-bottom: 15px;
            font-size: 30px;
        }

        p {
            color: #555;
            line-height: 1.7;
            margin-bottom: 25px;
            font-size: 16px;
        }

        .details {
            background: #f9fafb;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .details p {
            margin: 10px 0;
            color: #333;
            font-size: 15px;
        }

        .home-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #16a34a;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            transition: .3s;
        }

        .home-btn:hover {
            background: #15803d;
        }

        /* Tablet */

        @media (max-width:768px){

            .success-card{
                padding:30px 20px;
            }

            .tick{
                width:110px;
                height:110px;
            }

            h1{
                font-size:26px;
            }

            p{
                font-size:15px;
            }

            .home-btn{
                font-size:17px;
            }

        }

        /* Mobile */

        @media (max-width:480px){

            body{
                padding:15px;
            }

            .success-card{
                padding:25px 15px;
            }

            .tick{
                width:90px;
                height:90px;
            }

            h1{
                font-size:22px;
            }

            p{
                font-size:14px;
            }

            .details{
                padding:15px;
            }

            .details p{
                font-size:14px;
            }

            .home-btn{
                padding:13px;
                font-size:16px;
            }

        }

    </style>

</head>

<body>

    <div class="success-card">

        <div class="tick">
            <img src="./assets/images/confetti.png" alt="Order Success">
        </div>

        <h1>Order Placed Successfully</h1>

        <p>
            Thank you for shopping with us.<br>
            Your order has been placed successfully.
        </p>

        <div class="details">

            <p><strong>Payment:</strong> Cash On Delivery</p>

            <p><strong>Status:</strong> Order Confirmed</p>

            <p><strong>Estimated Delivery:</strong> 3 - 5 Days</p>

        </div>

        <a href="index.html" class="home-btn">
            Continue Shopping
        </a>

    </div>

</body>

</html>

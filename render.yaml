services:
  - type: web
    name: footcap-e-commerce
    env: java
    plan: free

    buildCommand: ./mvnw clean package

    startCommand: java -jar target/*.jar

    envVars:
      - key: DB_URL
        sync: false

      - key: DB_USERNAME
        sync: false

      - key: DB_PASSWORD
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false